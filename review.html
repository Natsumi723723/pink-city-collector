<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINK CITY — レビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 30px;
    background: linear-gradient(135deg, #ff006e, #ff4db8, #ff006e);
    text-align: center;
  }
  header h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #ff006e, 0 0 40px #ff4db8;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: #111;
    font-size: 14px;
    color: #ff4db8;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: #ff4db8; }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #222;
  }
  .card-body { padding: 12px; }
  .card-name {
    font-size: 12px;
    line-height: 1.4;
    color: #ddd;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-source {
    font-size: 10px;
    color: #ff4db8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.8; transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .btn-approve { background: #ff006e; }
  .btn-reject { background: #2a2a2a; }
  .card-link {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 12px;
  }
  .done-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    border-radius: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.approved .done-overlay { background: rgba(255,0,110,0.6); opacity: 1; }
  .card.rejected .done-overlay { background: rgba(0,0,0,0.7); opacity: 1; }
  .config-panel {
    background: #111;
    border: 1px solid #ff006e;
    border-radius: 12px;
    padding: 20px;
    margin: 20px auto;
    max-width: 600px;
  }
  .config-panel input {
    width: 100%;
    background: #222;
    border: 1px solid #333;
    color: #fff;
    padding: 10px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 13px;
  }
  .config-panel label { font-size: 12px; color: #ff4db8; display: block; margin-top: 12px; }
  .btn-load {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #ff006e, #ff4db8);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #loading { text-align: center; padding: 60px; color: #ff4db8; font-size: 18px; }
</style>
</head>
<body>

<header>
  <h1>💗 PINK CITY REVIEW 💗</h1>
</header>

<div class="stats" id="stats">
  <span>💗 承認済み: <strong id="approved-count">0</strong></span>
  <span>⏳ 未レビュー: <strong id="pending-count">0</strong></span>
  <span>✕ 却下: <strong id="rejected-count">0</strong></span>
</div>

<div class="config-panel" id="config-panel">
  <label>Supabase URL</label>
  <input id="sb-url" type="text" placeholder="https://xxxxxxxxxx.supabase.co">
  <label>Supabase Anon Key</label>
  <input id="sb-key" type="password" placeholder="eyJxxxxxxxxxx...">
  <button class="btn-load" onclick="loadProducts()">💗 PINK を読み込む</button>
</div>

<div id="loading" style="display:none">読み込み中... 💗</div>
<div class="grid" id="grid"></div>

<script>
let supabaseUrl = '', supabaseKey = '';

async function sbFetch(path, options = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000);
  try {
    const res = await fetch(supabaseUrl + '/rest/v1/' + path, {
      signal: controller.signal,
      headers: {
        'apikey': supabaseKey,
        'Authorization': 'Bearer ' + supabaseKey,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
      },
      ...options,
    });
    clearTimeout(timer);
    const text = await res.text();
    if (!res.ok) {
      console.error('Supabase error:', res.status, text);
      return [];
    }
    try { return JSON.parse(text); } catch(e) { return []; }
  } catch(e) {
    clearTimeout(timer);
    console.error('fetch error:', e);
    return [];
  }
}

async function loadProducts() {
  supabaseUrl = document.getElementById('sb-url').value.trim();
  supabaseKey = document.getElementById('sb-key').value.trim();
  if (!supabaseUrl || !supabaseKey) { alert('URLとKeyを入力してください'); return; }

  localStorage.setItem('sb-url', supabaseUrl);
  localStorage.setItem('sb-key', supabaseKey);

  document.getElementById('config-panel').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const data = await sbFetch('pink_products?status=eq.pending&order=created_at.desc&limit=500&select=id,product_name,image_url,product_url,source');
    document.getElementById('loading').style.display = 'none';
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('grid').innerHTML = '<p style="color:#ff4db8;padding:40px;text-align:center">接続エラーまたは商品なし。URLとKeyを確認してください。</p>';
      document.getElementById('config-panel').style.display = 'block';
      return;
    }
    renderGrid(data);
    updateStats();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('config-panel').style.display = 'block';
    alert('エラー: ' + e.message);
  }
}

function renderGrid(products) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!products.length) { grid.innerHTML = '<p style="color:#666;padding:40px">未レビューの商品はありません</p>'; return; }

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;
    card.innerHTML = `
      <img src="${p.image_url || ''}" alt="${p.product_name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23222%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22 fill=%22%23ff4db8%22>💗</text></svg>'">
      <a class="card-link" href="${p.product_url}" target="_blank">🔗</a>
      <div class="card-body">
        <div class="card-source">${p.source || ''}</div>
        <div class="card-name">${p.product_name}</div>
        <div class="card-actions">
          <button class="btn btn-approve" onclick="review('${p.id}', 'approved', this)">💗</button>
          <button class="btn btn-reject" onclick="review('${p.id}', 'rejected', this)">✕</button>
        </div>
      </div>
      <div class="done-overlay" id="overlay-${p.id}"></div>
    `;
    grid.appendChild(card);
  });
}

async function review(id, status, btn) {
  btn.disabled = true;
  const emoji = status === 'approved' ? '💗' : '✕';

  await fetch(supabaseUrl + '/rest/v1/pink_products?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': supabaseKey,
      'Authorization': 'Bearer ' + supabaseKey,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({ status }),
  });

  const card = document.querySelector(`[data-id="${id}"]`);
  const overlay = document.getElementById('overlay-' + id);
  overlay.textContent = emoji;
  card.classList.add(status);

  setTimeout(() => { card.style.opacity = '0.3'; }, 500);
  updateStats();
}

async function updateStats() {
  const data = await sbFetch('pink_products?select=status');
  const counts = { approved: 0, pending: 0, rejected: 0 };
  data.forEach(r => counts[r.status] = (counts[r.status] || 0) + 1);
  document.getElementById('approved-count').textContent = counts.approved;
  document.getElementById('pending-count').textContent = counts.pending;
  document.getElementById('rejected-count').textContent = counts.rejected;
}

// 保存済みの設定を復元
window.onload = () => {
  const url = localStorage.getItem('sb-url');
  const key = localStorage.getItem('sb-key');
  if (url) document.getElementById('sb-url').value = url;
  if (key) document.getElementById('sb-key').value = key;
};
</script>
</body>
</html>
