<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINK CITY — レビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 30px;
    background: linear-gradient(135deg, #ff006e, #ff4db8, #ff006e);
    text-align: center;
  }
  header h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #ff006e, 0 0 40px #ff4db8;
  }

  /* ── STATS ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: #111;
    font-size: 14px;
    color: #ff4db8;
  }
  .stat-btn {
    background: none;
    border: none;
    color: #ff4db8;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 12px;
    border-radius: 20px;
    transition: background 0.15s, transform 0.1s;
  }
  .stat-btn:hover { background: rgba(255,0,110,0.15); transform: scale(1.05); }
  .stat-btn.active { background: rgba(255,0,110,0.25); outline: 1px solid #ff006e; }

  /* ── APPROVED COUNTS BAR ── */
  #approved-counts {
    display: flex;
    background: #0d0d0d;
    border-bottom: 2px solid #ff006e44;
  }
  .apc-chip {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    cursor: pointer;
    border-right: 1px solid #1a1a1a;
    transition: background 0.15s;
    gap: 2px;
  }
  .apc-chip:last-child { border-right: none; }
  .apc-chip:hover { background: #1a1a1a; }
  .apc-emoji { font-size: 16px; line-height: 1; }
  .apc-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #aaa;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }
  .apc-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: bold;
    color: #ff4db8;
    text-shadow: 0 0 12px rgba(255,77,184,0.7), 0 0 24px rgba(255,0,110,0.4);
    line-height: 1.2;
  }

  /* ── GAME BAR ── */
  #game-bar {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 8px 20px;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
  }
  #game-bar.visible { display: flex; }
  .game-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .game-stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #aaa;
    text-transform: uppercase;
  }
  .game-stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    font-weight: bold;
    color: #ff4db8;
    text-shadow: 0 0 10px rgba(255,77,184,0.5);
    transition: transform 0.15s;
  }
  .game-stat-value.bump {
    transform: scale(1.4);
    color: #ff006e;
    text-shadow: 0 0 20px rgba(255,0,110,0.8);
  }
  #streak-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  #streak-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
  }
  #streak-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    font-weight: bold;
    color: #ff4db8;
    transition: all 0.2s;
  }
  #streak-value.hot {
    color: #ff006e;
    text-shadow: 0 0 12px rgba(255,0,110,0.7);
    animation: streakPulse 0.6s ease;
  }
  @keyframes streakPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.5) rotate(-5deg); }
    100% { transform: scale(1); }
  }

  /* ── METERS ── */
  #meters {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 8px 24px;
    background: #080808;
    border-bottom: 1px solid #111;
  }
  #meters.visible { display: flex; }
  .meter-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .meter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #bbb;
    width: 110px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .meter-track {
    flex: 1;
    height: 5px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.34,1.2,0.64,1);
  }
  #milestone-fill {
    background: linear-gradient(90deg, #ff006e, #ff4db8);
    box-shadow: 0 0 6px rgba(255,0,110,0.5);
  }
  #daily-fill {
    background: linear-gradient(90deg, #cc00ff, #ff4db8);
    box-shadow: 0 0 6px rgba(200,0,255,0.4);
  }
  #approve-fill {
    background: linear-gradient(90deg, #ff006e, #ff4db8);
    box-shadow: 0 0 6px rgba(255,0,110,0.4);
  }
  #reject-fill {
    background: #2a2a2a;
  }
  .meter-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #ccc;
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }
  /* デイリーゴール入力 */
  #daily-goal-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #ccc;
    width: 30px;
    text-align: center;
    outline: none;
    cursor: pointer;
  }
  #daily-goal-input:focus { border-color: #ff4db8; color: #ff4db8; }

  /* ── MILESTONE TOAST ── */
  #milestone-popup {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #0f0f0f;
    border: 1px solid #ff006e;
    border-radius: 12px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1000;
    box-shadow: 0 0 20px rgba(255,0,110,0.3);
    pointer-events: none;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
  }
  #milestone-popup.show {
    transform: translateY(0);
    opacity: 1;
  }
  #milestone-emoji { font-size: 22px; }
  #milestone-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: #ff006e;
    text-shadow: 0 0 10px rgba(255,0,110,0.5);
  }
  #milestone-sub {
    font-size: 11px;
    color: #ff4db8;
    letter-spacing: 1px;
  }

  /* ── SOURCE FILTER ── */
  .source-filter {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 20px;
    background: #0d0d0d;
    border-bottom: 1px solid #1a1a1a;
  }
  .src-btn {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #ddd;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .src-btn:hover { border-color: #ff4db8; color: #ff4db8; }
  .src-btn.active {
    background: linear-gradient(135deg, #ff006e22, #ff4db822);
    border-color: #ff006e;
    color: #ff4db8;
    box-shadow: 0 0 8px rgba(255,0,110,0.3);
  }

  /* ── MODE INDICATOR ── */
  #mode-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: #1a0010;
    border-bottom: 1px solid #330022;
    font-size: 12px;
    color: #ff4db8;
  }
  #mode-bar.visible { display: flex; }
  #mode-label { letter-spacing: 1px; }
  #back-btn {
    background: none;
    border: 1px solid #330022;
    color: #888;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  #back-btn:hover { border-color: #ff4db8; color: #ff4db8; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: #ff4db8; }
  /* ステータス別ボーダー */
  .card[data-status="approved"] { border-color: rgba(255,0,110,0.4); }
  .card[data-status="rejected"] { border-color: rgba(80,80,80,0.5); opacity: 0.7; }

  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #222;
  }
  .card-body { padding: 12px; }
  .card-name {
    font-size: 12px;
    line-height: 1.4;
    color: #ddd;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-source {
    font-size: 10px;
    color: #ff4db8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.8; transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .btn-approve { background: #ff006e; color: #fff; }
  .btn-reject { background: #2a2a2a; color: #fff; }
  .btn-change {
    flex: 1;
    padding: 8px 6px;
    border: none;
    border-radius: 8px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-change:hover { opacity: 0.85; transform: scale(1.03); }
  .btn-change:active { transform: scale(0.96); }
  .btn-change-reject  { background: #3a1a1a; color: #ff6688; border: 1px solid #551122; }
  .btn-change-approve { background: #1a0d1a; color: #ff4db8; border: 1px solid #550055; }
  .btn-change-pending { background: #1a1a2a; color: #8899ff; border: 1px solid #223366; }

  /* 現在のステータスを光らせる */
  .card[data-status="approved"] .btn-approve { box-shadow: 0 0 10px #ff006e; }
  .card[data-status="rejected"] .btn-reject { box-shadow: 0 0 10px #555; }

  .card-link {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 12px;
  }
  .done-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    border-radius: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  /* ジャッジ済み：オーバーレイ表示、カードは残す */
  .card.judged-approved .done-overlay { background: rgba(255,0,110,0.55); opacity: 1; }
  .card.judged-rejected .done-overlay { background: rgba(0,0,0,0.65); opacity: 1; }
  .card.judged-approved { border-color: rgba(255,0,110,0.5); }
  .card.judged-rejected { opacity: 0.45; }
  /* ボタンを非活性っぽく */
  .card.judged-approved .btn-approve,
  .card.judged-rejected .btn-reject { opacity: 0.3; cursor: default; }

  /* ── CONFIG ── */
  .config-panel {
    background: #111;
    border: 1px solid #ff006e;
    border-radius: 12px;
    padding: 20px;
    margin: 20px auto;
    max-width: 600px;
  }
  .config-panel input {
    width: 100%;
    background: #222;
    border: 1px solid #333;
    color: #fff;
    padding: 10px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 13px;
  }
  .config-panel label { font-size: 12px; color: #ff4db8; display: block; margin-top: 12px; }
  .btn-load {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #ff006e, #ff4db8);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #loading { text-align: center; padding: 60px; color: #ff4db8; font-size: 18px; }
  #empty { text-align: center; padding: 60px; color: #444; font-size: 14px; display: none; }
</style>
</head>
<body>

<header>
  <h1>💗 PINK CITY REVIEW 💗</h1>
</header>

<div class="stats" id="stats">
  <button class="stat-btn" id="btn-pending"  onclick="showMode('pending')">⏳ 未レビュー: <strong id="pending-count">0</strong></button>
  <button class="stat-btn" id="btn-approved" onclick="showMode('approved')">💗 承認済み: <strong id="approved-count">0</strong></button>
  <button class="stat-btn" id="btn-rejected" onclick="showMode('rejected')">✕ 却下: <strong id="rejected-count">0</strong></button>
</div>

<!-- Milestone popup -->
<div id="milestone-popup">
  <div id="milestone-emoji">🎉</div>
  <div>
    <div id="milestone-text">100 JUDGES!</div>
    <div id="milestone-sub">YOU'RE ON FIRE 🔥</div>
  </div>
</div>

<!-- Meters -->
<div id="meters">
  <div class="meter-row">
    <div class="meter-label">NEXT MILESTONE</div>
    <div class="meter-track"><div class="meter-fill" id="milestone-fill" style="width:0%"></div></div>
    <div class="meter-value" id="milestone-meter-val">0/10</div>
  </div>
  <div class="meter-row">
    <div class="meter-label">TODAY'S GOAL</div>
    <div class="meter-track"><div class="meter-fill" id="daily-fill" style="width:0%"></div></div>
    <div class="meter-value">
      <span id="daily-current">0</span>/<input id="daily-goal-input" type="number" value="50" min="1" max="999" title="目標を変更">
    </div>
  </div>
  <div class="meter-row">
    <div class="meter-label">💗 APPROVE RATE</div>
    <div class="meter-track" style="display:flex;gap:1px">
      <div class="meter-fill" id="approve-fill" style="width:50%"></div>
      <div class="meter-fill" id="reject-fill" style="width:50%"></div>
    </div>
    <div class="meter-value" id="approve-rate-val">-%</div>
  </div>
</div>

<!-- Game bar -->
<div id="game-bar">
  <div class="game-stat">
    <div class="game-stat-label">TODAY</div>
    <div class="game-stat-value" id="today-count">0</div>
  </div>
  <div class="game-stat">
    <div class="game-stat-label">TOTAL</div>
    <div class="game-stat-value" id="total-count">0</div>
  </div>
  <div id="streak-wrap">
    <div id="streak-label">STREAK</div>
    <div id="streak-value">0🔥</div>
  </div>
</div>

<!-- APPROVED COUNTS BAR -->
<div id="approved-counts">
  <div class="apc-chip" onclick="setStyle('glitter')">
    <span class="apc-emoji">✨</span>
    <div class="apc-label">GLITTER</div>
    <div class="apc-num" id="apc-glitter">—</div>
  </div>
  <div class="apc-chip" onclick="setStyle('neon')">
    <span class="apc-emoji">🌈</span>
    <div class="apc-label">NEON</div>
    <div class="apc-num" id="apc-neon">—</div>
  </div>
  <div class="apc-chip" onclick="setStyle('leopard')">
    <span class="apc-emoji">🐆</span>
    <div class="apc-label">LEOPARD</div>
    <div class="apc-num" id="apc-leopard">—</div>
  </div>
  <div class="apc-chip" onclick="setStyle('clear')">
    <span class="apc-emoji">🫧</span>
    <div class="apc-label">CLEAR</div>
    <div class="apc-num" id="apc-clear">—</div>
  </div>
</div>

<div class="source-filter" id="style-filter" style="display:flex">
  <button class="src-btn active" data-style="all"     onclick="setStyle('all')">ALL</button>
  <button class="src-btn" data-style="glitter"  onclick="setStyle('glitter')">✨ GLITTER</button>
  <button class="src-btn" data-style="neon"     onclick="setStyle('neon')">🌈 NEON</button>
  <button class="src-btn" data-style="leopard"  onclick="setStyle('leopard')">🐆 LEOPARD</button>
  <button class="src-btn" data-style="clear"    onclick="setStyle('clear')">🫧 CLEAR</button>
</div>

<div class="source-filter" id="source-filter" style="display:flex">
  <button class="src-btn active" data-source="all" onclick="setSource('all')">🌐 ALL</button>
  <button class="src-btn" data-source="amazon" onclick="setSource('amazon')">📦 Amazon</button>
  <button class="src-btn" data-source="aliexpress" onclick="setSource('aliexpress')">🛒 AliExpress</button>
  <button class="src-btn" data-source="buyma" onclick="setSource('buyma')">👜 BUYMA</button>
  <button class="src-btn" data-source="yahoo" onclick="setSource('yahoo')">🛍 Yahoo</button>
</div>

<div id="mode-bar">
  <span id="mode-label"></span>
  <button id="back-btn" onclick="showMode('pending')">← 未レビューに戻る</button>
</div>

<div class="config-panel" id="config-panel">
  <label>Supabase URL</label>
  <input id="sb-url" type="text" placeholder="https://xxxxxxxxxx.supabase.co">
  <label>Supabase Anon Key</label>
  <input id="sb-key" type="password" placeholder="eyJxxxxxxxxxx...">
  <button class="btn-load" onclick="loadProducts()">💗 PINK を読み込む</button>
</div>

<div id="loading" style="display:none">読み込み中... 💗</div>
<div class="grid" id="grid"></div>
<div id="empty">該当する商品はありません 💗</div>

<script>
let supabaseUrl = '', supabaseKey = '';
let currentMode = 'pending';
let currentSource = 'all';
let currentStyle = 'all';

// ── ゲーミフィケーション ──
const MILESTONES = [
  { n: 10,   emoji: '✨', text: '10 JUDGES!',   sub: 'いい調子！' },
  { n: 25,   emoji: '💅', text: '25 JUDGES!',   sub: 'ノってきた！' },
  { n: 50,   emoji: '🔥', text: '50 JUDGES!',   sub: 'フィフティ達成！' },
  { n: 100,  emoji: '💗', text: '100 JUDGES!',  sub: 'センター達成！YOU\'RE ON FIRE🔥' },
  { n: 200,  emoji: '🌸', text: '200 JUDGES!',  sub: 'マジやばい！！' },
  { n: 300,  emoji: '👑', text: '300 JUDGES!',  sub: 'PINK CITY の女王！' },
  { n: 500,  emoji: '🪩', text: '500 JUDGES!',  sub: 'レジェンド級...' },
  { n: 1000, emoji: '🎆', text: '1000 JUDGES!', sub: 'もはや神' },
];

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function loadGameStats() {
  const saved = localStorage.getItem('pinkc_today_date');
  const today = getToday();
  if (saved !== today) {
    localStorage.setItem('pinkc_today_date', today);
    localStorage.setItem('pinkc_today_count', '0');
  }
  return {
    today: parseInt(localStorage.getItem('pinkc_today_count') || '0'),
    total: parseInt(localStorage.getItem('pinkc_total_count') || '0'),
    streak: parseInt(localStorage.getItem('pinkc_streak') || '0'),
  };
}

function saveGameStats(stats) {
  localStorage.setItem('pinkc_today_count', stats.today);
  localStorage.setItem('pinkc_total_count', stats.total);
  localStorage.setItem('pinkc_streak', stats.streak);
}

function updateGameUI() {
  const stats = loadGameStats();
  document.getElementById('today-count').textContent = stats.today;
  document.getElementById('total-count').textContent = stats.total;
  const sv = document.getElementById('streak-value');
  sv.textContent = stats.streak + (stats.streak >= 5 ? '🔥' : '');
  sv.classList.toggle('hot', stats.streak >= 5);
  updateMeters(stats);
}

function updateMeters(stats) {
  // 次のマイルストーンまで
  const nextM = MILESTONES.find(m => m.n > stats.total) || MILESTONES[MILESTONES.length - 1];
  const prevM = [...MILESTONES].reverse().find(m => m.n <= stats.total);
  const prevN = prevM ? prevM.n : 0;
  const pct = nextM.n === prevN ? 100 : Math.min(100, ((stats.total - prevN) / (nextM.n - prevN)) * 100);
  document.getElementById('milestone-fill').style.width = pct + '%';
  document.getElementById('milestone-meter-val').textContent = stats.total + '/' + nextM.n;

  // デイリーゴール
  const goal = parseInt(document.getElementById('daily-goal-input').value) || 50;
  const dailyPct = Math.min(100, (stats.today / goal) * 100);
  document.getElementById('daily-fill').style.width = dailyPct + '%';
  document.getElementById('daily-current').textContent = stats.today;

  // 承認率（セッション中カウント）
  const approveCount = parseInt(localStorage.getItem('pinkc_approve_count') || '0');
  const rejectCount  = parseInt(localStorage.getItem('pinkc_reject_count')  || '0');
  const total = approveCount + rejectCount;
  if (total > 0) {
    const aPct = Math.round((approveCount / total) * 100);
    document.getElementById('approve-fill').style.width = aPct + '%';
    document.getElementById('reject-fill').style.width = (100 - aPct) + '%';
    document.getElementById('approve-rate-val').textContent = aPct + '%';
  }
}

function bumpValue(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);
}

let milestoneTimer = null;
function showMilestone(milestone) {
  const popup = document.getElementById('milestone-popup');
  document.getElementById('milestone-emoji').textContent = milestone.emoji;
  document.getElementById('milestone-text').textContent = milestone.text;
  document.getElementById('milestone-sub').textContent = milestone.sub;
  popup.classList.add('show');
  if (milestoneTimer) clearTimeout(milestoneTimer);
  milestoneTimer = setTimeout(() => popup.classList.remove('show'), 1800);
}

function recordJudge(isJudge, newStatus) {
  if (!isJudge) return;
  const stats = loadGameStats();
  stats.today++;
  stats.total++;
  stats.streak++;
  saveGameStats(stats);
  // 承認率カウント
  if (newStatus === 'approved') {
    localStorage.setItem('pinkc_approve_count', (parseInt(localStorage.getItem('pinkc_approve_count') || '0') + 1));
  } else if (newStatus === 'rejected') {
    localStorage.setItem('pinkc_reject_count', (parseInt(localStorage.getItem('pinkc_reject_count') || '0') + 1));
  }
  updateGameUI();
  bumpValue('today-count');
  bumpValue('total-count');
  const hit = MILESTONES.find(m => m.n === stats.total);
  if (hit) showMilestone(hit);
}

function resetStreak() {
  const stats = loadGameStats();
  stats.streak = 0;
  saveGameStats(stats);
  updateGameUI();
}

async function sbFetch(path, options = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000);
  try {
    const res = await fetch(supabaseUrl + '/rest/v1/' + path, {
      signal: controller.signal,
      headers: {
        'apikey': supabaseKey,
        'Authorization': 'Bearer ' + supabaseKey,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
      },
      ...options,
    });
    clearTimeout(timer);
    const text = await res.text();
    if (!res.ok) { console.error('Supabase error:', res.status, text); return []; }
    try { return JSON.parse(text); } catch(e) { return []; }
  } catch(e) {
    clearTimeout(timer);
    console.error('fetch error:', e);
    return [];
  }
}

async function loadProducts() {
  supabaseUrl = document.getElementById('sb-url').value.trim();
  supabaseKey = document.getElementById('sb-key').value.trim();
  if (!supabaseUrl || !supabaseKey) { alert('URLとKeyを入力してください'); return; }

  localStorage.setItem('sb-url', supabaseUrl);
  localStorage.setItem('sb-key', supabaseKey);

  document.getElementById('config-panel').style.display = 'none';
  document.getElementById('style-filter').style.display = 'flex';
  document.getElementById('source-filter').style.display = 'flex';
  document.getElementById('game-bar').classList.add('visible');
  document.getElementById('meters').classList.add('visible');
  document.getElementById('loading').style.display = 'block';
  updateGameUI();

  try {
    await showMode('pending');
    await updateStats();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('config-panel').style.display = 'block';
    alert('エラー: ' + e.message);
  }
}

async function showMode(mode) {
  if (!supabaseUrl) return;
  currentMode = mode;

  // ボタンのactive状態
  ['pending','approved','rejected'].forEach(m => {
    document.getElementById('btn-' + m).classList.toggle('active', m === mode);
  });

  // モードバー
  const modeBar = document.getElementById('mode-bar');
  const modeLabel = document.getElementById('mode-label');
  const backBtn = document.getElementById('back-btn');
  if (mode === 'pending') {
    modeBar.classList.remove('visible');
  } else {
    modeBar.classList.add('visible');
    modeLabel.textContent = mode === 'approved' ? '💗 承認済み一覧 — ジャッジを変更できます' : '✕ 却下一覧 — ジャッジを変更できます';
    backBtn.style.display = mode === 'pending' ? 'none' : '';
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('empty').style.display = 'none';

  const srcFilter   = currentSource !== 'all' ? `&source=eq.${currentSource}` : '';
  const styleFilter = currentStyle  !== 'all' ? `&style=eq.${currentStyle}`   : '';
  const data = await sbFetch(`pink_products?status=eq.${mode}${srcFilter}${styleFilter}&order=created_at.desc&limit=500&select=id,product_name,image_url,product_url,source,style`);
  document.getElementById('loading').style.display = 'none';

  if (!Array.isArray(data) || data.length === 0) {
    if (!supabaseUrl) {
      document.getElementById('config-panel').style.display = 'block';
    } else {
      document.getElementById('empty').style.display = 'block';
    }
    return;
  }
  renderGrid(data, mode);
}

function renderGrid(products, mode) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;
    card.dataset.status = mode;

    // ボタン：現在のステータス以外の選択肢を表示
    let actionBtns = '';
    if (mode === 'pending') {
      actionBtns = `
        <button class="btn btn-approve" onclick="review('${p.id}', 'approved', this)">💗</button>
        <button class="btn btn-reject"  onclick="review('${p.id}', 'rejected', this)">✕</button>`;
    } else if (mode === 'approved') {
      actionBtns = `
        <button class="btn-change btn-change-reject"  onclick="review('${p.id}', 'rejected', this)">✕ 却下</button>
        <button class="btn-change btn-change-pending" onclick="review('${p.id}', 'pending', this)">↩ 未レビュー</button>`;
    } else if (mode === 'rejected') {
      actionBtns = `
        <button class="btn-change btn-change-approve" onclick="review('${p.id}', 'approved', this)">💗 承認</button>
        <button class="btn-change btn-change-pending" onclick="review('${p.id}', 'pending', this)">↩ 未レビュー</button>`;
    }

    card.innerHTML = `
      <img src="${p.image_url || ''}" alt="${p.product_name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23222%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22 fill=%22%23ff4db8%22>💗</text></svg>'">
      <a class="card-link" href="${p.product_url}" target="_blank">🔗</a>
      <div class="card-body">
        <div class="card-source">${p.source || ''}</div>
        <div class="card-name">${p.product_name}</div>
        <div class="card-actions">${actionBtns}</div>
      </div>
      <div class="done-overlay" id="overlay-${p.id}"></div>
    `;
    grid.appendChild(card);
  });
}

async function review(id, newStatus, btn) {
  // 即座にUI更新（待ち時間ゼロ）
  const card = document.querySelector(`[data-id="${id}"]`);
  const overlay = document.getElementById('overlay-' + id);
  const emoji = newStatus === 'approved' ? '💗' : newStatus === 'rejected' ? '✕' : '↩';

  // ボタン両方を無効化
  card.querySelectorAll('button').forEach(b => b.disabled = true);

  // オーバーレイ表示（カードはその場に残る）
  overlay.textContent = emoji;
  card.classList.remove('judged-approved', 'judged-rejected');
  if (newStatus === 'approved') card.classList.add('judged-approved');
  else if (newStatus === 'rejected') card.classList.add('judged-rejected');
  else {
    // pending に戻す場合はオーバーレイを消してカード復元
    overlay.textContent = '';
    card.classList.remove('judged-approved', 'judged-rejected');
    if (currentMode !== 'pending') {
      card.style.transition = 'opacity 0.3s';
      card.style.opacity = '0';
      setTimeout(() => card.remove(), 300);
    }
  }

  // ゲームカウント
  recordJudge(newStatus !== 'pending', newStatus);

  // バックグラウンドでDB更新（UIをブロックしない）
  fetch(supabaseUrl + '/rest/v1/pink_products?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': supabaseKey,
      'Authorization': 'Bearer ' + supabaseKey,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({ status: newStatus }),
  }).then(() => updateStats());
}

function setSource(source) {
  currentSource = source;
  document.querySelectorAll('[data-source]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.source === source);
  });
  showMode(currentMode);
}

function setStyle(style) {
  currentStyle = style;
  document.querySelectorAll('[data-style]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.style === style);
  });
  showMode(currentMode);
}

async function getCount(status) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000);
  const srcFilter   = currentSource !== 'all' ? `&source=eq.${currentSource}` : '';
  const styleFilter = currentStyle  !== 'all' ? `&style=eq.${currentStyle}`   : '';
  try {
    const res = await fetch(`${supabaseUrl}/rest/v1/pink_products?status=eq.${status}${srcFilter}${styleFilter}&select=id`, {
      signal: controller.signal,
      headers: {
        'apikey': supabaseKey,
        'Authorization': 'Bearer ' + supabaseKey,
        'Prefer': 'count=exact',
        'Range-Unit': 'items',
        'Range': '0-0',
      },
    });
    clearTimeout(timer);
    const range = res.headers.get('Content-Range') || '';
    const match = range.match(/\/(\d+)$/);
    return match ? parseInt(match[1]) : 0;
  } catch(e) {
    clearTimeout(timer);
    return 0;
  }
}

async function fetchApprovedStyleCounts() {
  const styles = ['glitter','neon','leopard','clear'];
  await Promise.all(styles.map(async (style) => {
    try {
      const res = await fetch(`${supabaseUrl}/rest/v1/pink_products?status=eq.approved&style=eq.${style}&select=id`, {
        headers: {
          'apikey': supabaseKey,
          'Authorization': 'Bearer ' + supabaseKey,
          'Prefer': 'count=exact',
          'Range-Unit': 'items',
          'Range': '0-0',
        }
      });
      const cr = res.headers.get('Content-Range');
      const count = cr ? parseInt(cr.split('/')[1]) || 0 : 0;
      const el = document.getElementById('apc-' + style);
      if (el) el.textContent = count.toLocaleString();
    } catch(e) {}
  }));
}

async function updateStats() {
  const [approved, pending, rejected] = await Promise.all([
    getCount('approved'),
    getCount('pending'),
    getCount('rejected'),
  ]);
  document.getElementById('approved-count').textContent = approved;
  document.getElementById('pending-count').textContent = pending;
  document.getElementById('rejected-count').textContent = rejected;
  fetchApprovedStyleCounts();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('daily-goal-input').addEventListener('input', () => updateGameUI());
});

window.onload = () => {
  const url = localStorage.getItem('sb-url');
  const key = localStorage.getItem('sb-key');
  if (url) document.getElementById('sb-url').value = url;
  if (key) document.getElementById('sb-key').value = key;
  if (url && key) {
    supabaseUrl = url;
    supabaseKey = key;
    document.getElementById('config-panel').style.display = 'none';
    document.getElementById('style-filter').style.display = 'flex';
    document.getElementById('source-filter').style.display = 'flex';
    document.getElementById('game-bar').classList.add('visible');
    document.getElementById('meters').classList.add('visible');
    updateGameUI();
    showMode('pending').then(() => updateStats());
  }
};
</script>
