<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINK CITY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --hot: #ff006e;
  --neon: #ff4db8;
  --magenta: #ff00aa;
  --deep: #cc0055;
  --bg: #050505;
  --shelf-bg: #0d0d0d;
  --shelf-line: #1a1a1a;
  --card-w: 170px;
  --card-h: 220px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  width: 100%; height: 100%;
  background: var(--bg);
}
body {
  width: 100%; min-height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  overflow-x: hidden;
}

/* scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(255,0,110,0.01) 3px, rgba(255,0,110,0.01) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  background: #050505;
  border-bottom: 1px solid #1a1a1a;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 56px;
  flex-wrap: nowrap;
  overflow: visible;
}

@media (max-width: 680px) {
  #header {
    height: auto;
    flex-wrap: wrap;
    padding: 8px 12px 6px;
    gap: 6px;
  }
  #logo { font-size: 18px; letter-spacing: 3px; }
  #status { display: none; }
  #search-wrap { order: 2; max-width: 100%; flex: 1 1 100%; }
  #style-filters { order: 3; flex: 1 1 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
  #style-filters::-webkit-scrollbar { display: none; }
  #filters { order: 4; flex: 1 1 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
  #filters::-webkit-scrollbar { display: none; }
  #skin-btn { margin-left: auto; }
  /* style-counts bar と main の位置調整はJSで動的計算 */
  /* topはJSで動的設定 */
}

#logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--hot);
  text-shadow: 0 0 12px var(--hot), 0 0 24px var(--neon);
  white-space: nowrap;
  flex-shrink: 0;
}

#search-wrap {
  flex: 1;
  max-width: 320px;
  position: relative;
}
#search-wrap::before {
  content: '🔍';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  color: #fff;
  font-size: 13px;
  padding: 6px 12px 6px 30px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--hot); }

#filters {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: transparent;
  color: #888;
  font-size: 10px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.filter-btn.active {
  border-color: var(--hot);
  color: var(--hot);
  background: rgba(255,0,110,0.08);
  text-shadow: 0 0 6px var(--hot);
}
/* スタイル別フィルター行 */
#style-filters {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.style-btn {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: transparent;
  color: #888;
  font-size: 10px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.style-btn[data-style="glitter"].active { border-color: #ff4db8; color: #ff4db8; background: rgba(255,77,184,0.08); }
.style-btn[data-style="neon"].active    { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,200,0.08); }
.style-btn[data-style="leopard"].active { border-color: #ffaa00; color: #ffaa00; background: rgba(255,170,0,0.08); }
.style-btn[data-style="clear"].active   { border-color: #aaddff; color: #aaddff; background: rgba(170,220,255,0.08); }
.style-btn[data-style="all"].active     { border-color: var(--hot); color: var(--hot); background: rgba(255,0,110,0.08); }

/* ── STYLE COUNTS BAR ── */
#style-counts {
  display: flex;
  justify-content: center;
  gap: 0;
  background: #080808;
  border-bottom: 1px solid #111;
  overflow: hidden;
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  z-index: 99;
}
.style-count-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-right: 1px solid #111;
  cursor: pointer;
  transition: background 0.15s;
  flex: 1;
  justify-content: center;
}
.style-count-chip:last-child { border-right: none; }
.style-count-chip:hover { background: #111; }
.style-count-chip.active { background: #0f0f0f; }
.scc-emoji { font-size: 14px; }
.scc-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: #444;
  text-transform: uppercase;
}
.scc-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  line-height: 1;
}
.scc-glitter  { color: #ff4db8; text-shadow: 0 0 8px rgba(255,77,184,0.4); }
.scc-neon     { color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,200,0.3); }
.scc-leopard  { color: #ffaa00; text-shadow: 0 0 8px rgba(255,170,0,0.3); }
.scc-clear    { color: #aaddff; text-shadow: 0 0 8px rgba(170,220,255,0.3); }

#status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #444;
  white-space: nowrap;
  margin-left: auto;
}
#status span { color: var(--neon); }

/* ── MAIN SCROLL AREA ── */
#main {
  position: relative;
  /* topはJSのadjustLayoutで padding-top として設定 */
}

/* ── SHELF ── */
.shelf-section {
  border-bottom: 1px solid #111;
  padding: 0;
}

.shelf-label {
  padding: 14px 20px 10px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.shelf-label-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: #ff4db8;
  text-shadow: 0 0 10px rgba(255,77,184,0.4);
}
.shelf-label-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #553344;
}

/* horizontal scroll row */
.shelf-row {
  display: flex;
  gap: 10px;
  padding: 0 20px 0px;
  overflow-x: auto;
  overflow-y: visible;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
}
.shelf-row::-webkit-scrollbar { height: 2px; }
.shelf-row::-webkit-scrollbar-track { background: transparent; }
.shelf-row::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 1px; }

/* shelf bottom line (the actual "shelf") */
.shelf-floor {
  height: 3px;
  margin: 0 20px;
  background: linear-gradient(90deg, transparent, #1a1a1a 10%, #1a1a1a 90%, transparent);
  position: relative;
}
.shelf-floor::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,0,110,0.15) 30%, rgba(255,0,110,0.15) 70%, transparent);
}

/* ── CARD ── */
.card {
  flex-shrink: 0;
  width: var(--card-w);
  scroll-snap-align: start;
  cursor: pointer;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
  border: 1px solid #1e1e1e;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}
.card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--hot);
  box-shadow: 0 0 16px rgba(255,0,110,0.35), 0 8px 24px rgba(0,0,0,0.6);
  z-index: 10;
}

.card-img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  background: #181818;
  display: block;
}
.card-img-placeholder {
  width: 100%;
  height: 170px;
  background: linear-gradient(135deg, #1a0010, #2d0030, #1a0020);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.card-body {
  padding: 8px 10px 10px;
}
.card-source {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: #ff4db8;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.card-name {
  font-size: 11px;
  line-height: 1.45;
  color: #bbb;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 5px;
}
.card-price {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  font-weight: bold;
  color: #ff006e;
  text-shadow: 0 0 6px rgba(255,0,110,0.4);
  letter-spacing: 0.5px;
}

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  gap: 20px;
}
#loading-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 10px;
  color: var(--hot);
  text-shadow: 0 0 30px var(--hot), 0 0 60px var(--neon);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#loading-bar-wrap {
  width: 200px;
  height: 2px;
  background: #1a1a1a;
  border-radius: 1px;
  overflow: hidden;
}
#loading-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--hot), var(--neon));
  width: 0%;
  transition: width 0.3s;
  border-radius: 1px;
}
#loading-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #444;
  letter-spacing: 2px;
}

/* ── EMPTY ── */
#empty {
  display: none;
  text-align: center;
  padding: 80px 20px;
  color: #333;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
}

/* ── SCROLL HINT (fade in then out) ── */
#scroll-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: #222;
  pointer-events: none;
  animation: hintFade 4s ease 1.5s forwards;
  z-index: 50;
}
@keyframes hintFade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; }
}

/* ══════════════════════════════════════════════
   SKIN SWITCHER UI
══════════════════════════════════════════════ */
#skin-btn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid #2a2a2a;
  background: #111;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
#skin-btn:hover {
  border-color: var(--hot);
  box-shadow: 0 0 10px rgba(255,0,110,0.4);
}
#skin-panel {
  display: none;
  position: fixed;
  top: 64px; right: 16px;
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 14px;
  z-index: 500;
  box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255,0,110,0.1);
  min-width: 220px;
  backdrop-filter: blur(12px);
}
#skin-panel.open { display: block; }
#skin-panel-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: #444;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1a1a1a;
}
.skin-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
  margin-bottom: 4px;
}
.skin-option:hover { background: #1a1a1a; }
.skin-option.active {
  border-color: var(--hot);
  background: rgba(255,0,110,0.06);
}
.skin-option:last-child { margin-bottom: 0; }
.skin-swatch {
  width: 28px; height: 28px;
  border-radius: 6px;
  flex-shrink: 0;
  border: 1px solid #333;
}
.skin-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: #ccc;
}
.skin-desc {
  font-size: 9px;
  color: #555;
  margin-top: 1px;
}

/* ══════════════════════════════════════════════
   SKIN 1: RHINESTONE QUEEN (default)
══════════════════════════════════════════════ */
body[data-skin="rhinestone"] {
  --bg: #FF0FA6;
  background: #FF0FA6;
}
body[data-skin="rhinestone"]::after { content: none; }
body[data-skin="rhinestone"] #main::before { content: none; }
body[data-skin="rhinestone"] .shelf-label-text {
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 12px rgba(0,0,0,0.3);
}
body[data-skin="rhinestone"] .shelf-label-count {
  color: rgba(255,255,255,0.6);
}
body[data-skin="rhinestone"] .shelf-section {
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
body[data-skin="rhinestone"] .shelf-floor {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3) 20%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.3) 80%, transparent);
}
body[data-skin="rhinestone"] .card {
  background: rgba(20,0,18,0.92);
  border: 1px solid rgba(255,77,184,0.25);
  box-shadow:
    0 0 0 1px rgba(255,0,110,0.1),
    inset 0 0 10px rgba(255,0,110,0.05);
  backdrop-filter: blur(2px);
}
body[data-skin="rhinestone"] .card:hover {
  border-color: var(--hot);
  box-shadow:
    0 0 0 1px var(--hot),
    0 0 12px rgba(255,0,110,0.6),
    0 0 30px rgba(255,0,110,0.3),
    0 0 60px rgba(255,77,184,0.15),
    0 8px 32px rgba(0,0,0,0.8),
    0 0 0 3px rgba(255,77,184,0.2),
    0 0 0 5px rgba(255,0,110,0.1),
    0 0 0 7px rgba(255,77,184,0.05);
  transform: translateY(-8px) scale(1.04);
}
body[data-skin="rhinestone"] .card-img {
  border-bottom: 1px solid rgba(255,0,110,0.2);
}
body[data-skin="rhinestone"] #header,
body[data-skin="rhinestone"] #style-counts {
  background: rgba(20,0,18,0.92);
  backdrop-filter: blur(12px);
  border-color: rgba(255,0,110,0.2);
}
body[data-skin="rhinestone"] .shelf-section { border-color: rgba(255,0,110,0.08); }
body[data-skin="rhinestone"] .shelf-floor {
  background: linear-gradient(90deg, transparent, rgba(255,0,110,0.3) 20%, rgba(255,77,184,0.4) 50%, rgba(255,0,110,0.3) 80%, transparent);
}
body[data-skin="rhinestone"] .shelf-floor::after {
  background: linear-gradient(90deg, transparent, rgba(255,200,230,0.4) 30%, rgba(255,200,230,0.4) 70%, transparent);
}

/* ══════════════════════════════════════════════
   SKIN 2: DARK CHROME
══════════════════════════════════════════════ */
body[data-skin="chrome"] {
  --bg: #060608;
  --hot: #ff006e;
  --neon: #ff4db8;
  background: #060608;
}
body[data-skin="chrome"]::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(40,40,50,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(30,30,40,0.4) 0%, transparent 50%),
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.008) 40px,
      rgba(255,255,255,0.008) 41px
    );
  pointer-events: none; z-index: 1;
}
body[data-skin="chrome"] .card {
  background: #0a0a0c;
  border: 2px solid transparent;
  background-clip: padding-box;
  position: relative;
}
body[data-skin="chrome"] .card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 9px;
  background: linear-gradient(135deg, #555, #222, #888, #333, #666);
  z-index: -1;
}
body[data-skin="chrome"] .card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 0 0px 0px transparent;
}
body[data-skin="chrome"] .card:hover::before {
  background: linear-gradient(135deg, #fff, #aaa, var(--hot), #ccc, #fff);
}
body[data-skin="chrome"] .card:hover {
  transform: translateY(-8px) scale(1.04);
  box-shadow: 0 12px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255,0,110,0.3);
}
body[data-skin="chrome"] .card-img {
  filter: contrast(1.05) saturate(1.1);
}
body[data-skin="chrome"] #header,
body[data-skin="chrome"] #style-counts {
  background: #060608;
  border-color: #222;
}
body[data-skin="chrome"] .shelf-label-text { color: #ccc; text-shadow: none; }
body[data-skin="chrome"] .shelf-floor {
  background: linear-gradient(90deg, transparent, #333 10%, #555 50%, #333 90%, transparent);
}
body[data-skin="chrome"] #logo {
  color: #ccc;
  text-shadow: 0 0 20px rgba(255,255,255,0.3);
  background: linear-gradient(135deg, #fff, #aaa, var(--hot), #ddd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ══════════════════════════════════════════════
   SKIN 3: Y2K GLITTER
══════════════════════════════════════════════ */
@keyframes floatParticle {
  0%   { transform: translateY(0px) rotate(0deg);   opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
@keyframes rainbowBorder {
  0%   { border-image-source: linear-gradient(0deg,   #ff006e, #ff4db8, #cc00ff, #00ffcc, #ffff00, #ff006e); }
  25%  { border-image-source: linear-gradient(90deg,  #ff006e, #ff4db8, #cc00ff, #00ffcc, #ffff00, #ff006e); }
  50%  { border-image-source: linear-gradient(180deg, #ff006e, #ff4db8, #cc00ff, #00ffcc, #ffff00, #ff006e); }
  75%  { border-image-source: linear-gradient(270deg, #ff006e, #ff4db8, #cc00ff, #00ffcc, #ffff00, #ff006e); }
  100% { border-image-source: linear-gradient(360deg, #ff006e, #ff4db8, #cc00ff, #00ffcc, #ffff00, #ff006e); }
}
@keyframes holo {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
body[data-skin="y2k"] {
  --bg: #2d0028;
  background:
    radial-gradient(ellipse 120% 60% at 50% -5%,  #ff006e44 0%, transparent 50%),
    radial-gradient(ellipse 80%  50% at 0%   80%,  #cc007744 0%, transparent 50%),
    radial-gradient(ellipse 70%  50% at 100% 30%,  #aa005588 0%, transparent 50%),
    radial-gradient(ellipse 60%  40% at 50%  110%, #ff4db855 0%, transparent 50%),
    #2d0028;
}
/* Dense pink glitter overlay */
body[data-skin="y2k"]::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(2px 2px at  3%  7%,  rgba(255,200,230,0.95) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 18%,  rgba(255,255,255,0.9)  0%, transparent 100%),
    radial-gradient(2px 2px at 18%  3%,  rgba(255,0,180,0.8)    0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%,  rgba(255,255,255,0.95) 0%, transparent 100%),
    radial-gradient(3px 3px at 32% 12%,  rgba(255,150,220,0.9)  0%, transparent 100%),
    radial-gradient(1px 1px at 40% 55%,  rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(2px 2px at 48% 25%,  rgba(255,0,110,0.9)    0%, transparent 100%),
    radial-gradient(1px 1px at 55% 70%,  rgba(255,200,230,0.85) 0%, transparent 100%),
    radial-gradient(2px 2px at 62%  8%,  rgba(255,255,255,0.9)  0%, transparent 100%),
    radial-gradient(1px 1px at 70% 45%,  rgba(255,77,184,0.95)  0%, transparent 100%),

<script>
// ── GLITTER TEXTURE GENERATOR ──────────────────────────────
// タイル用オフスクリーンCanvasでラメテクスチャを生成 → dataURL → CSS背景に適用
function generateGlitterTexture() {
  const SIZE = 400; // タイルサイズ
  const c = document.createElement('canvas');
  c.width = SIZE; c.height = SIZE;
  const ctx = c.getContext('2d');

  // ① ベース：ホットピンク
  ctx.fillStyle = '#c40058';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // ② ラメ粒子をびっしり（粒子数 = 面積 / 4 → 超密）
  const N = SIZE * SIZE / 4;
  // ラメ粒子カラーパレット（ピンク系＋白シルバー）
  const palette = [
    [255, 255, 255],  // 白（強ハイライト）
    [255, 230, 245],  // 薄ピンクホワイト
    [255, 180, 220],  // ライトピンク
    [255, 130, 190],  // ミディアムピンク
    [220,  60, 150],  // ディープピンク
    [255, 200, 235],  // ペールピンク
    [200,  20, 110],  // ダークマゼンタ（影）
    [255, 255, 200],  // ゴールドっぽいハイライト
  ];

  for (let i = 0; i < N; i++) {
    const x = Math.random() * SIZE;
    const y = Math.random() * SIZE;
    // ラメは平たいひし形 → 細長い楕円で表現
    const w = Math.random() * 3 + 0.5;   // 幅 0.5〜3.5
    const h = w * (Math.random() * 0.4 + 0.15); // 高さは幅の15〜55%
    const angle = Math.random() * Math.PI;
    const rgb = palette[Math.floor(Math.random() * palette.length)];
    const alpha = Math.random() * 0.75 + 0.25;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ③ 強いスパークル（白点）をランダムに散らす
  const sparks = SIZE * SIZE / 120;
  for (let i = 0; i < sparks; i++) {
    const x = Math.random() * SIZE;
    const y = Math.random() * SIZE;
    const r = Math.random() * 1.5 + 0.3;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.6 + 0.4})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ④ 全体に薄いピンク光沢グラデーション
  const grd = ctx.createLinearGradient(0, 0, SIZE, SIZE);
  grd.addColorStop(0,   'rgba(255,150,200,0.12)');
  grd.addColorStop(0.5, 'rgba(255,255,255,0.06)');
  grd.addColorStop(1,   'rgba(180,0,80,0.10)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, SIZE, SIZE);

  return c.toDataURL('image/png');
}

let _glitterDataURL = null;

function applyGlitterBackground() {
  if (!_glitterDataURL) _glitterDataURL = generateGlitterTexture();
  document.body.style.backgroundImage = `url("${_glitterDataURL}")`;
  document.body.style.backgroundSize  = '400px 400px';
  document.body.style.backgroundRepeat = 'repeat';
}

function removeGlitterBackground() {
  document.body.style.backgroundImage = '';
  document.body.style.backgroundSize  = '';
  document.body.style.backgroundRepeat = '';
}

function showGlitterCanvas(show) {

function categorize(product) {
  const name = (product.product_name || '').toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.id === 'other') continue;
    if (cat.keywords.some(kw => name.includes(kw.toLowerCase()))) {
      return cat.id;
    }
  }
  return 'other';

async function fetchAll() {
  let all = [];
  let from = 0;
  const PAGE = 500;
  while (true) {
    const res = await fetch(
      `${SB_URL}/rest/v1/pink_products?status=eq.approved&order=created_at.desc&select=id,product_name,image_url,product_url,source,price,style&limit=${PAGE}&offset=${from}`,
      { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }
    );
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) break;
    all = all.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
    setProgress(Math.min(90, (all.length / 300) * 90));
  }
  return all;
}

function setProgress(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
}

function getFiltered() {
  let items = allProducts;
  if (currentStyle !== 'all') {
    items = items.filter(p => (p.style || 'glitter') === currentStyle);
  }
  if (currentFilter !== 'all') {
    items = items.filter(p => (p.source || '').toLowerCase() === currentFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(p => (p.product_name || '').toLowerCase().includes(q));
  }
  return items;
}

function makeCard(p) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = p.product_url || '#';
  card.target = '_blank';
  card.rel = 'noopener';

  const imgHTML = p.image_url
    ? `<img class="card-img" src="${escHtml(p.image_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-img-placeholder" style="display:none">💗</div>`
    : `<div class="card-img-placeholder">💗</div>`;

  card.innerHTML = `
    ${imgHTML}
    <div class="card-body">
      <div class="card-source">${escHtml(p.source || '')}</div>
      <div class="card-name">${escHtml(p.product_name || '')}</div>
      ${p.price ? `<div class="card-price">${escHtml(p.price)}</div>` : ''}
    </div>
  `;
  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderShelves(products) {
  const container = document.getElementById('shelves');
  container.innerHTML = '';
  document.getElementById('empty').style.display = products.length ? 'none' : 'block';
  document.getElementById('count').textContent = products.length;

  // カテゴリ別に仕分け
  const buckets = {};
  CATEGORIES.forEach(cat => { buckets[cat.id] = []; });
  products.forEach(p => {
    const catId = categorize(p);
    buckets[catId].push(p);
  });

  // 棚を描画（アイテムがあるカテゴリのみ）
  CATEGORIES.forEach(cat => {
    const items = buckets[cat.id];
    if (items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'shelf-section';

    const labelEl = document.createElement('div');
    labelEl.className = 'shelf-label';
    labelEl.innerHTML = `
      <span class="shelf-label-text">${cat.label}</span>
      <span class="shelf-label-count">${items.length} items</span>
    `;

    const row = document.createElement('div');
    row.className = 'shelf-row';
    items.forEach(p => row.appendChild(makeCard(p)));

    const floor = document.createElement('div');
    floor.className = 'shelf-floor';

    section.appendChild(labelEl);
    section.appendChild(row);
    section.appendChild(floor);
    container.appendChild(section);
  });
}

function refresh() {
  renderShelves(getFiltered());
}

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  refresh();
});

async function fetchStyleCounts() {
  const styles = ['glitter', 'neon', 'leopard', 'clear'];
  const SB_HEADERS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Prefer': 'count=exact', 'Range': '0-0' };
  for (const s of styles) {
    const r = await fetch(`${SB_URL}/rest/v1/pink_products?status=eq.approved&style=eq.${s}&select=id`, { headers: SB_HEADERS });
    const range = r.headers.get('Content-Range') || '';
    const m = range.match(/\/(\d+)$/);
    const count = m ? parseInt(m[1]) : 0;
    const el = document.getElementById('cnt-' + s);
    if (el) el.textContent = count.toLocaleString();
  }
  document.getElementById('style-counts').classList.add('visible');
}

function clickStyleChip(style) {
  currentStyle = currentStyle === style ? 'all' : style;
  // style-btnsとchipsのactive同期
  document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === (currentStyle || 'all')));
  document.querySelectorAll('.style-count-chip').forEach((c, i) => {
    const s = ['glitter','neon','leopard','clear'][i];
    c.classList.toggle('active', s === currentStyle);
  });
  refresh();
}

// Style filters
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    // chipsも同期
    document.querySelectorAll('.style-count-chip').forEach((c, i) => {
      const s = ['glitter','neon','leopard','clear'][i];
      c.classList.toggle('active', s === currentStyle);
    });
    refresh();
  });
});

// Source filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.src;
    refresh();
  });
});

// ヘッダー高さに応じてstyle-countsとmainの位置を調整
function adjustLayout() {
  const headerH = document.getElementById('header').offsetHeight;
  const countsEl = document.getElementById('style-counts');
  const mainEl   = document.getElementById('main');
  countsEl.style.top = headerH + 'px';
  const countsH = countsEl.offsetHeight;
  // #mainはposition:relativeなのでpadding-topで押し下げ
  mainEl.style.paddingTop = (headerH + countsH) + 'px';
}
window.addEventListener('resize', adjustLayout);
document.fonts && document.fonts.ready.then(adjustLayout);

// Init
(async () => {
  setProgress(10);
  try {
    allProducts = await fetchAll();
    setProgress(100);
    await new Promise(r => setTimeout(r, 300));
  } catch(e) {
    console.error(e);
  }
  document.getElementById('loading-screen').style.opacity = '0';
  document.getElementById('loading-screen').style.transition = 'opacity 0.4s';
  setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 400);
  adjustLayout();
  renderShelves(getFiltered());
  await fetchStyleCounts();
  adjustLayout(); // style-counts表示後に再計算
})();
</script>
</body>
</html>
