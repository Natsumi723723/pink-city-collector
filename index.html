<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PINK CITY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --hot: #ff006e;
  --neon: #ff4db8;
  --magenta: #ff00aa;
  --deep: #cc0055;
  --bg: #050505;
  --white: #ffffff;
  --grey: #444;
  --card-w: 180px;
  --card-h: 230px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: var(--hot); color: #000; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
  user-select: none;
  cursor: crosshair;
}

/* ── SCANLINES ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(255,0,110,0.012) 3px, rgba(255,0,110,0.012) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ── GRID BG ── */
#grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,0,110,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,110,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  transform-origin: 0 0;
  z-index: 0;
}

/* ── HUD (fixed overlay) ── */
#hud {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 100;
}

/* Header bar */
#topbar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 54px;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1a1a1a;
  display: flex; align-items: center;
  gap: 14px; padding: 0 20px;
  pointer-events: all;
}

.logo-small {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  white-space: nowrap;
  text-shadow: 0 0 16px rgba(255,0,110,0.7);
}
.logo-small .p { color: var(--hot); }

.stat-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--grey);
  white-space: nowrap;
}
.stat-pill strong { color: var(--hot); }

.search-wrap {
  position: relative;
  flex: 1; max-width: 320px;
}
.search-wrap::before {
  content: '›';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--hot); font-size: 16px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: #0d0d0d;
  border: 1px solid #1e1e1e;
  color: #fff;
  padding: 7px 10px 7px 26px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; letter-spacing: 1px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--hot); }
#search::placeholder { color: #2a2a2a; }

.filter-group { display: flex; gap: 6px; }
.fbtn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid #1e1e1e;
  color: #444;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  pointer-events: all;
}
.fbtn:hover { border-color: var(--neon); color: var(--neon); }
.fbtn.active {
  background: var(--hot); border-color: var(--hot);
  color: #000; font-weight: bold;
  box-shadow: 0 0 12px rgba(255,0,110,0.5);
}

/* Controls */
#controls {
  position: absolute; top: 66px; right: 16px;
  display: flex; flex-direction: column; gap: 6px;
  pointer-events: all;
}
.ctrl-btn {
  width: 36px; height: 36px;
  background: rgba(10,10,10,0.9);
  border: 1px solid #222;
  color: #888;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  backdrop-filter: blur(10px);
}
.ctrl-btn:hover { border-color: var(--hot); color: var(--hot); box-shadow: 0 0 10px rgba(255,0,110,0.3); }

/* Minimap */
#minimap {
  position: absolute; bottom: 20px; right: 16px;
  width: 140px; height: 90px;
  background: rgba(8,8,8,0.92);
  border: 1px solid #1e1e1e;
  backdrop-filter: blur(10px);
  overflow: hidden;
  pointer-events: all;
}
#minimap::before {
  content: 'MAP';
  position: absolute; top: 4px; left: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 2px; color: #2a2a2a;
  z-index: 2;
}
#minimap-canvas {
  width: 100%; height: 100%;
  display: block;
}
#minimap-viewport {
  position: absolute;
  border: 1px solid var(--hot);
  box-shadow: 0 0 6px rgba(255,0,110,0.4);
  pointer-events: none;
}

/* Zoom indicator */
#zoom-indicator {
  position: absolute; bottom: 20px; left: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  color: #2a2a2a;
}

/* Loading */
#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 200;
  gap: 20px;
}
.load-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px; letter-spacing: 6px;
  color: var(--white);
  text-shadow: 0 0 40px rgba(255,0,110,0.8), 0 0 80px rgba(255,0,110,0.3);
  animation: pulse-load 1.5s ease-in-out infinite;
}
.load-logo span { color: var(--hot); }
.load-bar-wrap {
  width: 240px; height: 2px;
  background: #111;
}
.load-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--deep), var(--hot), var(--neon));
  width: 0%;
  transition: width 0.3s ease;
  box-shadow: 0 0 10px var(--hot);
}
.load-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 3px;
  color: #333;
}
@keyframes pulse-load {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── CANVAS VIEWPORT ── */
#viewport {
  position: fixed;
  top: 54px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
  z-index: 1;
}
#viewport.dragging { cursor: grabbing; }

#canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
}

/* ── CARDS ── */
.card {
  position: absolute;
  width: var(--card-w);
  height: var(--card-h);
  background: #0c0c0c;
  border: 1px solid #181818;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.2s;
  will-change: transform;
}
.card:hover {
  transform: scale(1.08) !important;
  border-color: var(--hot);
  box-shadow:
    0 0 20px rgba(255,0,110,0.4),
    0 0 40px rgba(255,0,110,0.15),
    inset 0 0 20px rgba(255,0,110,0.04);
  z-index: 10;
}

.card-img {
  width: 100%; height: 148px;
  object-fit: cover;
  display: block;
  background: #0d0d0d;
  transition: filter 0.3s;
}
.card:hover .card-img { filter: saturate(1.3) brightness(1.05); }

.card-placeholder {
  width: 100%; height: 148px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  background: linear-gradient(135deg, #0d0d0d 0%, #1a0812 100%);
}
.card-placeholder .icon { font-size: 28px; opacity: 0.5; }
.card-placeholder .pname {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 1px;
  color: #2a2a2a; text-align: center;
  padding: 0 10px; line-height: 1.4;
}

.card-body {
  padding: 8px 10px;
  height: calc(var(--card-h) - 148px);
  display: flex; flex-direction: column; gap: 3px;
}
.card-source {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--hot);
}
.card-name {
  font-size: 10px; line-height: 1.4; color: #777;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* hover overlay */
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.2s;
  display: flex; align-items: flex-end;
  padding: 10px;
}
.card:hover .card-overlay { opacity: 1; }
.card-cta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: #000; background: var(--hot);
  padding: 5px 10px;
  box-shadow: 0 0 12px rgba(255,0,110,0.6);
}

/* glitch flicker on hover */
.card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(255,0,110,0.04) 100%);
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.card:hover::after { opacity: 1; }

/* ── AMBIENT ORBS ── */
.orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,110,0.08) 0%, transparent 70%);
  pointer-events: none;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-logo"><span>PINK</span> CITY</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-text" id="load-text">INITIALIZING...</div>
</div>

<!-- GRID BG -->
<div id="grid-bg"></div>

<!-- CANVAS VIEWPORT -->
<div id="viewport">
  <div id="canvas"></div>
</div>

<!-- HUD -->
<div id="hud">
  <!-- Topbar -->
  <div id="topbar">
    <div class="logo-small"><span class="p">PINK</span> CITY</div>
    <div class="stat-pill">
      <strong id="total-count">—</strong> ITEMS &nbsp;·&nbsp; <strong id="showing-count">—</strong> SHOWING
    </div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="SEARCH PINK...">
    </div>
    <div class="filter-group">
      <button class="fbtn active" data-src="all" onclick="setFilter('all',this)">ALL</button>
      <button class="fbtn" data-src="amazon" onclick="setFilter('amazon',this)">AMAZON</button>
      <button class="fbtn" data-src="aliexpress" onclick="setFilter('aliexpress',this)">ALIEXPRESS</button>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="ctrl-btn" onclick="resetView()" title="Home">⌂</button>
    <button class="ctrl-btn" onclick="zoom(1.3)" title="Zoom in">+</button>
    <button class="ctrl-btn" onclick="zoom(0.77)" title="Zoom out">−</button>
  </div>

  <!-- Zoom -->
  <div id="zoom-indicator">ZOOM: <span id="zoom-val">100</span>%</div>

  <!-- Minimap -->
  <div id="minimap">
    <canvas id="minimap-canvas"></canvas>
    <div id="minimap-viewport"></div>
  </div>
</div>

<script>
const SB_URL = 'https://gjcbtolotqywzdggckto.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqY2J0b2xvdHF5d3pkZ2dja3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzU4MzIsImV4cCI6MjA5NjA1MTgzMn0.dnMQl7cB5H7MGz0Nuh8PibQuYa1iYYmauJEhrlfyDBc';

const CARD_W = 180, CARD_H = 230, GAP = 24;
const COLS = 14;

let allProducts = [], visibleProducts = [];
let offsetX = 0, offsetY = 0, scale = 1;
let isDragging = false, startX = 0, startY = 0, lastX = 0, lastY = 0;
let canvasW = 0, canvasH = 0;
let currentFilter = 'all', searchQ = '';

// Seeded random for stable layout
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function getCardPos(idx) {
  const rand = seededRand(idx * 7919 + 3571);
  const col = idx % COLS;
  const row = Math.floor(idx / COLS);
  const jitterX = (rand() - 0.5) * 30;
  const jitterY = (rand() - 0.5) * 30;
  return {
    x: col * (CARD_W + GAP) + jitterX + 40,
    y: row * (CARD_H + GAP) + jitterY + 40,
  };
}

// ── LOAD ──────────────────────────────────────────────────────────
async function init() {
  setLoadText('FETCHING PINK...', 20);
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 12000);
  try {
    const res = await fetch(
      SB_URL + '/rest/v1/pink_products?status=eq.approved&order=created_at.desc&limit=1000&select=id,product_name,image_url,product_url,source',
      { signal: ctrl.signal, headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }
    );
    clearTimeout(timer);
    allProducts = await res.json();
    setLoadText('BUILDING CITY...', 60);
    await new Promise(r => setTimeout(r, 200));
    setLoadText('RENDERING...', 85);
    await new Promise(r => setTimeout(r, 100));
    visibleProducts = [...allProducts];
    buildCanvas();
    setLoadText('WELCOME TO PINK CITY', 100);
    await new Promise(r => setTimeout(r, 400));
    document.getElementById('loading').style.transition = 'opacity 0.6s';
    document.getElementById('loading').style.opacity = '0';
    await new Promise(r => setTimeout(r, 600));
    document.getElementById('loading').style.display = 'none';
    updateStats();
    updateMinimap();
  } catch(e) {
    setLoadText('ERROR: ' + e.message, 0);
  }
}

function setLoadText(msg, pct) {
  document.getElementById('load-text').textContent = msg;
  document.getElementById('load-bar').style.width = pct + '%';
}

// ── BUILD CANVAS ──────────────────────────────────────────────────
function buildCanvas() {
  const cv = document.getElementById('canvas');
  cv.innerHTML = '';

  const rows = Math.ceil(visibleProducts.length / COLS);
  canvasW = COLS * (CARD_W + GAP) + 80;
  canvasH = rows * (CARD_H + GAP) + 80;
  cv.style.width = canvasW + 'px';
  cv.style.height = canvasH + 'px';

  // ambient orbs
  for (let i = 0; i < 6; i++) {
    const r = seededRand(i * 1337);
    const orb = document.createElement('div');
    orb.className = 'orb';
    const s = 300 + r() * 400;
    orb.style.cssText = `width:${s}px;height:${s}px;left:${r()*canvasW}px;top:${r()*canvasH}px;margin:${-s/2}px`;
    cv.appendChild(orb);
  }

  const frag = document.createDocumentFragment();
  visibleProducts.forEach((p, i) => {
    const pos = getCardPos(i);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = `left:${pos.x}px;top:${pos.y}px`;
    card.title = p.product_name;

    const hasImg = p.image_url && p.image_url.length > 10;
    const safeName = esc(p.product_name);
    const shortName = esc(p.product_name.substring(0, 36));

    card.innerHTML = `
      ${hasImg
        ? `<img class="card-img" src="${p.image_url}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="card-placeholder" style="${hasImg ? 'display:none' : 'display:flex'}">
        <div class="icon">💗</div>
        <div class="pname">${shortName}</div>
      </div>
      <div class="card-body">
        <div class="card-source">${(p.source||'').toUpperCase()}</div>
        <div class="card-name">${safeName}</div>
      </div>
      <div class="card-overlay"><div class="card-cta">💗 BUY</div></div>
    `;
    card.addEventListener('click', (e) => {
      if (!isDragging) window.open(p.product_url, '_blank');
    });
    frag.appendChild(card);
  });
  cv.appendChild(frag);

  // center initial view
  const vp = document.getElementById('viewport');
  offsetX = (vp.clientWidth - canvasW * scale) / 2;
  offsetY = (vp.clientHeight - canvasH * scale) / 2;
  applyTransform();
}

// ── TRANSFORM ────────────────────────────────────────────────────
function applyTransform() {
  document.getElementById('canvas').style.transform =
    `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  // sync grid bg
  document.getElementById('grid-bg').style.backgroundPosition =
    `${offsetX}px ${offsetY + 54}px`;
  document.getElementById('grid-bg').style.backgroundSize =
    `${60 * scale}px ${60 * scale}px`;
  document.getElementById('zoom-val').textContent = Math.round(scale * 100);
  updateMinimapViewport();
}

function zoom(factor, cx, cy) {
  const vp = document.getElementById('viewport');
  cx = cx ?? vp.clientWidth / 2;
  cy = cy ?? vp.clientHeight / 2;
  const newScale = Math.max(0.15, Math.min(3, scale * factor));
  const ratio = newScale / scale;
  offsetX = cx - ratio * (cx - offsetX);
  offsetY = cy - ratio * (cy - offsetY);
  scale = newScale;
  applyTransform();
}

function resetView() {
  scale = 1;
  const vp = document.getElementById('viewport');
  offsetX = (vp.clientWidth - canvasW) / 2;
  offsetY = (vp.clientHeight - canvasH) / 2;
  applyTransform();
}

// ── DRAG ─────────────────────────────────────────────────────────
const vp = document.getElementById('viewport');
let dragMoved = false;

vp.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = true; dragMoved = false;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
  vp.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX - offsetX;
  const dy = e.clientY - startY - offsetY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  vp.classList.remove('dragging');
  setTimeout(() => { dragMoved = false; }, 10);
});

// wheel zoom
vp.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = vp.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  zoom(factor, cx, cy);
}, { passive: false });

// touch
let lastTouchDist = 0, lastTouchMid = null;
vp.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true; dragMoved = false;
    startX = e.touches[0].clientX - offsetX;
    startY = e.touches[0].clientY - offsetY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    lastTouchMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
  }
}, { passive: true });
vp.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    dragMoved = true;
    offsetX = e.touches[0].clientX - startX;
    offsetY = e.touches[0].clientY - startY;
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const mid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    zoom(dist / lastTouchDist, mid.x, mid.y - 54);
    lastTouchDist = dist;
    lastTouchMid = mid;
  }
}, { passive: false });
vp.addEventListener('touchend', () => {
  isDragging = false;
  setTimeout(() => { dragMoved = false; }, 10);
});

// ── MINIMAP ───────────────────────────────────────────────────────
function updateMinimap() {
  const mc = document.getElementById('minimap-canvas');
  const mm = document.getElementById('minimap');
  mc.width = mm.clientWidth;
  mc.height = mm.clientHeight;
  const ctx = mc.getContext('2d');
  const sx = mc.width / canvasW;
  const sy = mc.height / canvasH;
  ctx.clearRect(0, 0, mc.width, mc.height);
  visibleProducts.forEach((p, i) => {
    const pos = getCardPos(i);
    const hasImg = p.image_url && p.image_url.length > 10;
    ctx.fillStyle = hasImg ? 'rgba(255,0,110,0.5)' : 'rgba(255,77,184,0.3)';
    ctx.fillRect(pos.x * sx, pos.y * sy, CARD_W * sx, CARD_H * sy);
  });
  updateMinimapViewport();
}

function updateMinimapViewport() {
  if (!canvasW) return;
  const mm = document.getElementById('minimap');
  const mv = document.getElementById('minimap-viewport');
  const vp = document.getElementById('viewport');
  const sx = mm.clientWidth / canvasW;
  const sy = mm.clientHeight / canvasH;
  const vw = vp.clientWidth / scale;
  const vh = vp.clientHeight / scale;
  const vx = -offsetX / scale;
  const vy = -offsetY / scale;
  mv.style.left = Math.max(0, vx * sx) + 'px';
  mv.style.top = Math.max(0, vy * sy) + 'px';
  mv.style.width = Math.min(mm.clientWidth, vw * sx) + 'px';
  mv.style.height = Math.min(mm.clientHeight, vh * sy) + 'px';
}

// minimap click to navigate
document.getElementById('minimap').addEventListener('click', e => {
  const mm = document.getElementById('minimap');
  const rect = mm.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / mm.clientWidth;
  const my = (e.clientY - rect.top) / mm.clientHeight;
  const vp = document.getElementById('viewport');
  offsetX = -(mx * canvasW * scale) + vp.clientWidth / 2;
  offsetY = -(my * canvasH * scale) + vp.clientHeight / 2;
  applyTransform();
});

// ── FILTER & SEARCH ───────────────────────────────────────────────
function setFilter(src, btn) {
  currentFilter = src;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase();
  applyFilter();
});

function applyFilter() {
  visibleProducts = allProducts.filter(p => {
    if (currentFilter !== 'all' && p.source !== currentFilter) return false;
    if (searchQ && !p.product_name.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  buildCanvas();
  updateStats();
  updateMinimap();
}

function updateStats() {
  document.getElementById('total-count').textContent = allProducts.length;
  document.getElementById('showing-count').textContent = visibleProducts.length;
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// resize
window.addEventListener('resize', () => {
  if (canvasW) updateMinimapViewport();
});

// ── START ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
