<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINK CITY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --hot: #ff006e;
  --neon: #ff4db8;
  --magenta: #ff00aa;
  --deep: #cc0055;
  --bg: #050505;
  --shelf-bg: #0d0d0d;
  --shelf-line: #1a1a1a;
  --card-w: 170px;
  --card-h: 220px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
}

/* scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(255,0,110,0.01) 3px, rgba(255,0,110,0.01) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  background: #050505;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  z-index: 100;
}

#logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--hot);
  text-shadow: 0 0 12px var(--hot), 0 0 24px var(--neon);
  white-space: nowrap;
  flex-shrink: 0;
}

#search-wrap {
  flex: 1;
  max-width: 320px;
  position: relative;
}
#search-wrap::before {
  content: '🔍';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  color: #fff;
  font-size: 13px;
  padding: 6px 12px 6px 30px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--hot); }

#filters {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.filter-btn {
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px solid #2a2a2a;
  background: transparent;
  color: #888;
  font-size: 11px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.filter-btn.active {
  border-color: var(--hot);
  color: var(--hot);
  background: rgba(255,0,110,0.08);
  text-shadow: 0 0 6px var(--hot);
}

#status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #444;
  white-space: nowrap;
  margin-left: auto;
}
#status span { color: var(--neon); }

/* ── MAIN SCROLL AREA ── */
#main {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 0;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* ── SHELF ── */
.shelf-section {
  border-bottom: 1px solid #111;
  padding: 0;
}

.shelf-label {
  padding: 14px 20px 10px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.shelf-label-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: #ff4db8;
  text-shadow: 0 0 10px rgba(255,77,184,0.4);
}
.shelf-label-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #553344;
}

/* horizontal scroll row */
.shelf-row {
  display: flex;
  gap: 10px;
  padding: 0 20px 0px;
  overflow-x: auto;
  overflow-y: visible;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
}
.shelf-row::-webkit-scrollbar { height: 2px; }
.shelf-row::-webkit-scrollbar-track { background: transparent; }
.shelf-row::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 1px; }

/* shelf bottom line (the actual "shelf") */
.shelf-floor {
  height: 3px;
  margin: 0 20px;
  background: linear-gradient(90deg, transparent, #1a1a1a 10%, #1a1a1a 90%, transparent);
  position: relative;
}
.shelf-floor::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,0,110,0.15) 30%, rgba(255,0,110,0.15) 70%, transparent);
}

/* ── CARD ── */
.card {
  flex-shrink: 0;
  width: var(--card-w);
  scroll-snap-align: start;
  cursor: pointer;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
  border: 1px solid #1e1e1e;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}
.card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--hot);
  box-shadow: 0 0 16px rgba(255,0,110,0.35), 0 8px 24px rgba(0,0,0,0.6);
  z-index: 10;
}

.card-img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  background: #181818;
  display: block;
}
.card-img-placeholder {
  width: 100%;
  height: 170px;
  background: linear-gradient(135deg, #1a0010, #2d0030, #1a0020);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.card-body {
  padding: 8px 10px 10px;
}
.card-source {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: #ff4db8;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.card-name {
  font-size: 11px;
  line-height: 1.45;
  color: #bbb;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 5px;
}
.card-price {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  font-weight: bold;
  color: #ff006e;
  text-shadow: 0 0 6px rgba(255,0,110,0.4);
  letter-spacing: 0.5px;
}

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  gap: 20px;
}
#loading-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 10px;
  color: var(--hot);
  text-shadow: 0 0 30px var(--hot), 0 0 60px var(--neon);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#loading-bar-wrap {
  width: 200px;
  height: 2px;
  background: #1a1a1a;
  border-radius: 1px;
  overflow: hidden;
}
#loading-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--hot), var(--neon));
  width: 0%;
  transition: width 0.3s;
  border-radius: 1px;
}
#loading-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #444;
  letter-spacing: 2px;
}

/* ── EMPTY ── */
#empty {
  display: none;
  text-align: center;
  padding: 80px 20px;
  color: #333;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
}

/* ── SCROLL HINT (fade in then out) ── */
#scroll-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: #222;
  pointer-events: none;
  animation: hintFade 4s ease 1.5s forwards;
  z-index: 50;
}
@keyframes hintFade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div id="loading-logo">PINK CITY</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">LOADING...</div>
</div>

<!-- Header -->
<div id="header">
  <div id="logo">💗 PINK CITY</div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="商品を検索...">
  </div>
  <div id="filters">
    <button class="filter-btn active" data-src="all">ALL</button>
    <button class="filter-btn" data-src="amazon">AMAZON</button>
    <button class="filter-btn" data-src="aliexpress">ALI</button>
    <button class="filter-btn" data-src="buyma">BUYMA</button>
    <button class="filter-btn" data-src="yahoo">YAHOO</button>
  </div>
  <div id="status">表示中: <span id="count">0</span> 件</div>
</div>

<!-- Main scroll area -->
<div id="main">
  <div id="shelves"></div>
  <div id="empty">商品が見つかりません 💗</div>
</div>

<div id="scroll-hint">← → スクロールで棚を見て回る</div>

<script>
const SB_URL = 'https://gjcbtolotqywzdggckto.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqY2J0b2xvdHF5d3pkZ2dja3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzU4MzIsImV4cCI6MjA5NjA1MTgzMn0.dnMQl7cB5H7MGz0Nuh8PibQuYa1iYYmauJEhrlfyDBc';
const SHELF_SIZE = 30; // cards per shelf row

let allProducts = [];
let currentFilter = 'all';
let searchQuery = '';

// カテゴリ定義（順番＝棚の並び順）
const CATEGORIES = [
  {
    id: 'bag',
    label: '👜  BAGS & POUCHES',
    emoji: '👜',
    keywords: ['バッグ', 'ポーチ', 'ハンドバッグ', 'ショルダーバッグ', 'トートバッグ',
               'クラッチ', 'リュック', '財布', 'ウォレット', '巾着', 'bag', 'pouch',
               'handbag', 'shoulder', 'tote', 'clutch', 'backpack', 'wallet', 'purse'],
  },
  {
    id: 'jewelry',
    label: '💍  JEWELRY',
    emoji: '💍',
    keywords: ['ネックレス', 'リング', '指輪', 'ピアス', 'イヤリング', 'ブレスレット',
               'バングル', 'チョーカー', 'アンクレット', 'ブローチ',
               'necklace', 'ring', 'earring', 'bracelet', 'bangle', 'choker', 'brooch'],
  },
  {
    id: 'hair',
    label: '🎀  HAIR ACCESSORIES',
    emoji: '🎀',
    keywords: ['ヘアクリップ', 'ヘアピン', 'ヘアバンド', 'ヘアゴム', 'シュシュ',
               'バレッタ', 'カチューシャ', 'ヘアアクセ', 'hair clip', 'hair pin',
               'hair band', 'scrunchie', 'barrette', 'headband'],
  },
  {
    id: 'shoes',
    label: '👠  SHOES',
    emoji: '👠',
    keywords: ['シューズ', '靴', 'ヒール', 'パンプス', 'スニーカー', 'サンダル',
               'ブーツ', 'ミュール', 'ローファー', 'フラット', '草履',
               'shoe', 'heel', 'pump', 'sneaker', 'sandal', 'boot', 'mule'],
  },
  {
    id: 'phone',
    label: '📱  PHONE CASES',
    emoji: '📱',
    keywords: ['スマホケース', 'スマホカバー', 'iPhoneケース', 'スマートフォンケース',
               'phone case', 'iphone case', 'phone cover'],
  },
  {
    id: 'neon',
    label: '🪩  NEON SIGNS & LIGHTS',
    emoji: '🪩',
    keywords: ['ネオンサイン', 'ネオンライト', 'LEDサイン', 'LED ライト', 'LED ネオン',
               'neon sign', 'neon light', 'led sign', 'led light'],
  },
  {
    id: 'stationery',
    label: '📓  STATIONERY',
    emoji: '📓',
    keywords: ['ノート', '手帳', 'メモ帳', 'スケジュール帳', 'ダイアリー',
               'notebook', 'diary', 'planner', 'journal'],
  },
  {
    id: 'other',
    label: '✨  OTHER PINK STUFF',
    emoji: '✨',
    keywords: [], // catch-all
  },
];

function categorize(product) {
  const name = (product.product_name || '').toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.id === 'other') continue;
    if (cat.keywords.some(kw => name.includes(kw.toLowerCase()))) {
      return cat.id;
    }
  }
  return 'other';
}

async function fetchAll() {
  let all = [];
  let from = 0;
  const PAGE = 500;
  while (true) {
    const res = await fetch(
      `${SB_URL}/rest/v1/pink_products?status=eq.approved&order=created_at.desc&select=id,product_name,image_url,product_url,source,price&limit=${PAGE}&offset=${from}`,
      { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }
    );
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) break;
    all = all.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
    setProgress(Math.min(90, (all.length / 300) * 90));
  }
  return all;
}

function setProgress(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
}

function getFiltered() {
  let items = allProducts;
  if (currentFilter !== 'all') {
    items = items.filter(p => (p.source || '').toLowerCase() === currentFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(p => (p.product_name || '').toLowerCase().includes(q));
  }
  return items;
}

function makeCard(p) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = p.product_url || '#';
  card.target = '_blank';
  card.rel = 'noopener';

  const imgHTML = p.image_url
    ? `<img class="card-img" src="${escHtml(p.image_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-img-placeholder" style="display:none">💗</div>`
    : `<div class="card-img-placeholder">💗</div>`;

  card.innerHTML = `
    ${imgHTML}
    <div class="card-body">
      <div class="card-source">${escHtml(p.source || '')}</div>
      <div class="card-name">${escHtml(p.product_name || '')}</div>
      ${p.price ? `<div class="card-price">${escHtml(p.price)}</div>` : ''}
    </div>
  `;
  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderShelves(products) {
  const container = document.getElementById('shelves');
  container.innerHTML = '';
  document.getElementById('empty').style.display = products.length ? 'none' : 'block';
  document.getElementById('count').textContent = products.length;

  // カテゴリ別に仕分け
  const buckets = {};
  CATEGORIES.forEach(cat => { buckets[cat.id] = []; });
  products.forEach(p => {
    const catId = categorize(p);
    buckets[catId].push(p);
  });

  // 棚を描画（アイテムがあるカテゴリのみ）
  CATEGORIES.forEach(cat => {
    const items = buckets[cat.id];
    if (items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'shelf-section';

    const labelEl = document.createElement('div');
    labelEl.className = 'shelf-label';
    labelEl.innerHTML = `
      <span class="shelf-label-text">${cat.label}</span>
      <span class="shelf-label-count">${items.length} items</span>
    `;

    const row = document.createElement('div');
    row.className = 'shelf-row';
    items.forEach(p => row.appendChild(makeCard(p)));

    const floor = document.createElement('div');
    floor.className = 'shelf-floor';

    section.appendChild(labelEl);
    section.appendChild(row);
    section.appendChild(floor);
    container.appendChild(section);
  });
}

function refresh() {
  renderShelves(getFiltered());
}

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  refresh();
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.src;
    refresh();
  });
});

// Init
(async () => {
  setProgress(10);
  try {
    allProducts = await fetchAll();
    setProgress(100);
    await new Promise(r => setTimeout(r, 300));
  } catch(e) {
    console.error(e);
  }
  document.getElementById('loading-screen').style.opacity = '0';
  document.getElementById('loading-screen').style.transition = 'opacity 0.4s';
  setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 400);
  renderShelves(getFiltered());
})();
</script>
</body>
</html>
